spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/crm_test
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:crm}
    password: ${DB_PASSWORD:crm}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

jwt:
  secret: test-secret-key-must-be-at-least-32-bytes-long
  issuer: crm-test
  access-expire: 7200
  refresh-expire: 604800

logging:
  level:
    root: WARN
    com.cy.crm: INFO
