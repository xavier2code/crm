spring:
  datasource:
    # 测试环境共用 192.168.2.222 上的 PostgreSQL（独立 crm_test 库）
    url: jdbc:postgresql://192.168.2.222:5432/crm_test
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:123456}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

jwt:
  secret: test-secret-key-must-be-at-least-32-bytes-long
  issuer: crm-test
  access-expire: 7200
  refresh-expire: 604800

logging:
  level:
    root: WARN
    com.cy.crm: INFO
