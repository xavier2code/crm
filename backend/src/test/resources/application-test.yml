spring:
  datasource:
    url: jdbc:h2:mem:crm_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

jwt:
  secret: test-secret-key-must-be-at-least-32-bytes-long
  issuer: crm-test
  access-expire: 7200
  refresh-expire: 604800

logging:
  level:
    root: WARN
    com.cy.crm: INFO
