spring:
  application:
    name: crm-backend
  profiles:
    active: dev
  datasource:
    url: jdbc:h2:mem:crm;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  redis:
    enabled: ${REDIS_ENABLED:false}
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: 0
    timeout: 3000
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.cy.crm.module.**.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      logic-delete-field: is_deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:}
  issuer: ${JWT_ISSUER:crm-system}
  access-expire: 7200
  refresh-expire: 604800

captcha:
  expire: 300 # 验证码过期时间（秒）

password:
  max-history: 5 # 保存最近5次密码历史
  max-fail-count: 5 # 最大失败次数
  lock-duration: 1800 # 账户锁定时长（秒）
  expire-days: 90 # 密码过期天数

logging:
  file:
    path: ${LOG_PATH:./logs}
  level:
    root: INFO
    com.cy.crm: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:crm}
    username: ${DB_USERNAME:crm}
    password: ${DB_PASSWORD:crm}
    driver-class-name: org.postgresql.Driver
