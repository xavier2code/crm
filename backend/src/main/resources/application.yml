spring:
  application:
    name: crm-backend
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 100MB
  datasource:
    url: jdbc:postgresql://localhost:5432/crm
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:crm}
    password: ${DB_PASSWORD:crm}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  redis:
    enabled: ${REDIS_ENABLED:false}
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: 0
    timeout: 3000
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.cy.crm.module.**.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      logic-delete-field: is_deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:}
  issuer: ${JWT_ISSUER:crm-system}
  access-expire: 7200
  refresh-expire: 604800

captcha:
  expire: 300 # 验证码过期时间（秒）

password:
  max-history: 5 # 保存最近5次密码历史
  max-fail-count: 5 # 最大失败次数
  lock-duration: 1800 # 账户锁定时长（秒）
  expire-days: 90 # 密码过期天数
  min-length: 8 # 密码最小长度
  require-uppercase: true # 是否要求大写字母
  require-lowercase: true # 是否要求小写字母
  require-digit: true # 是否要求数字
  require-special: true # 是否要求特殊字符
  special-chars: "!@#$%^&*()_+-=[]{}|;':\",./<>?" # 特殊字符集合

logging:
  level:
    root: INFO
    com.cy.crm: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:crm}
    username: ${DB_USERNAME:crm}
    password: ${DB_PASSWORD:crm}
    driver-class-name: org.postgresql.Driver

# 文件存储（报销附件等）
file:
  storage:
    # 本地存储根目录（生产建议挂载到对象存储或 NAS）
    base-path: ${FILE_STORAGE_PATH:./data/uploads}
    # 单文件大小上限（字节），默认 20MB
    max-file-size: 20971520
    # 单次上传文件数上限
    max-files-per-request: 10
    # 允许的 MIME 类型（白名单）
    allowed-types: application/pdf,image/jpeg,image/png,image/gif,image/webp,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/zip
logging:
  file:
    path: ${LOG_PATH:/data/crm/logs}
